<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — GBG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">
        <img src="assets/GBGOfficialLogo.png" alt="GBG logo — Goat Bounce Goat" />
      </a>
      <div style="display:flex;align-items:center;gap:.5rem">
        <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">☰</button>
      </div>
      <nav id="siteNav" class="site-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="container" style="padding:3rem 0">
      <h1>Contact</h1>
      <p>Get in touch — add your contact details or a contact form here.</p>
      <form action="#" method="post" style="max-width:480px">
        <label>Name<br><input type="text" name="name" required></label><br><br>
        <label>Email<br><input type="email" name="email" required></label><br><br>
        <label>Message<br><textarea name="message" rows="4" required></textarea></label><br><br>
        <button class="btn" type="submit">Send</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 GBG</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
